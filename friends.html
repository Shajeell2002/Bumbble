  <script>
    // ── Firebase Init ──────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyBkDyP8KPuQc_knXLH9lhtQWDLb59xRJWs",

      appId: "1:213165886981:web:c18652003444869b1bd66c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ── DOM References ─────────────────────────────────────────────────────────
    const nav           = document.getElementById("navLinks");
    const userList      = document.getElementById("userList");
    const chatModal     = document.getElementById("chatModal");
    const chatMessages  = document.getElementById("chatMessages");
    const chatWith      = document.getElementById("chatWith");
    const chatInput     = document.getElementById("chatInput");
    const sendBtn       = document.getElementById("sendBtn");
    const fileBtn       = document.getElementById("fileBtn");
    const chatFileInput = document.getElementById("chatFileInput");
    const typingIndicator = document.getElementById("typingIndicator");
    const errorArea     = document.getElementById("errorArea");

    // ── State ──────────────────────────────────────────────────────────────────
    let currentUserUid       = "";
    let currentChatFriendUid = "";
    let currentChatListener  = null;
    let unreadCounters       = {};
    let lastChatTimestamps   = {};
    let typingTimeout;
    let cachedUsers          = {};

    // ── Error Handling ─────────────────────────────────────────────────────────
    window.addEventListener("error", e => showError(e.message || e));

    function showError(msg) {
      errorArea.innerHTML = `<div class="error-banner">${escapeHtml(msg)}</div>`;
    }

    // ── Utility ────────────────────────────────────────────────────────────────
    function getChatId(a, b) { return a < b ? `${a}_${b}` : `${b}_${a}`; }

    function escapeHtml(str) {
      if (typeof str !== "string") return "";
      return str.replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
    }

    // ── NSFW Filter ────────────────────────────────────────────────────────────
    let nsfwModel = null;

    async function loadNsfwModel() {
      try {
        nsfwModel = await nsfwjs.load("./assets/nsfw-model/");
      } catch (err) {
        console.error("❌ Failed to load NSFW model:", err);
        showError("⚠️ Image safety filter failed to load. Some uploads may be restricted.");
      }
    }
    loadNsfwModel();

    async function isImageNSFW(file) {
      return new Promise(async (resolve) => {
        if (!nsfwModel) {
          console.warn("⚠️ NSFW model not ready, skipping check.");
          return resolve(false);
        }
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = async () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext("2d").drawImage(img, 0, 0);
            const tensor = tf.browser.fromPixels(canvas);
            const predictions = await nsfwModel.classify(tensor);
            tensor.dispose();
            const top = predictions.reduce((a, b) => a.probability > b.probability ? a : b);
            const isUnsafe =
              (top.className === "Porn"   && top.probability > 0.01) ||
              (top.className === "Hentai" && top.probability > 0.01) ||
              (top.className === "Sexy"   && top.probability > 0.01);
            if (isUnsafe) console.warn("🚫 Blocked by NSFW Filter:", top);
            resolve(isUnsafe);
          } catch (err) {
            console.error("⚠️ NSFW check failed:", err);
            resolve(false);
          }
        };
        img.onerror = () => resolve(false);
        img.src = URL.createObjectURL(file);
      });
    }

    // ── File Upload with NSFW Check ────────────────────────────────────────────
    chatFileInput.addEventListener("change", async (e) => {
      const files = Array.from(e.target.files);
      for (const f of files) {
        const isUnsafe = await isImageNSFW(f);
        if (isUnsafe) {
          showError("🚫 NSFW image detected. Upload blocked for safety.");
          continue;
        }
        const chatId = getChatId(currentUserUid, currentChatFriendUid);
        const tempMsgRef = db.ref(`chats/${chatId}/messages`).push({
          sender: currentUserUid,
          receiver: currentChatFriendUid,
          uploading: true,
          fileName: f.name,
          timestamp: Date.now()
        });
        const reader = new FileReader();
        reader.onload = (ev) => {
          tempMsgRef.update({
            uploading: false,
            fileData: ev.target.result,
            fileType: f.type
          });
          db.ref(`unread/${currentChatFriendUid}/${currentUserUid}/${tempMsgRef.key}`).set(true);
        };
        reader.readAsDataURL(f);
      }
      // Reset input so same file can be re-selected if needed
      e.target.value = "";
    });

    // ── Auth ───────────────────────────────────────────────────────────────────
   auth.onAuthStateChanged(user => {
  if (user && user.emailVerified) {
    currentUserUid = user.uid;
            nav.innerHTML = `
          <a href="index.html">Home</a>
          <a href="friends.html">Friends</a>
          <a href="stories.html">Stories</a>
          <a href="safety.html">Safety</a>
          <a href="profile.html">Profile</a>
          <a href="notification.html">Notification <span id="notifBadge" class="badge" style="display:none;"></span></a>
          <a href="#" id="logoutBtn">Logout</a>`;

        document.getElementById("logoutBtn").onclick = () => {
          db.ref(`users/${currentUserUid}/public/online`).set(false);
          localStorage.removeItem("lastChatFriendUid");
          localStorage.removeItem("lastChatFriendName");
          auth.signOut().then(() => window.location.href = "login.html");
        };

        setupOnlineStatus();
        initUsersListener();         // fills cachedUsers first
        setupUnreadListener();
        listenLastMessagesForUserList();
        listenFriendsList();
        listenNotificationCount();

        const lastUid  = localStorage.getItem("lastChatFriendUid");

      } else {
        nav.innerHTML = `<a href="index.html">Home</a><a href="login.html">Login</a><a href="signup.html">Sign Up</a>`;
        userList.innerHTML = "<p style='padding:12px'>Please login to view users.</p>";
      }
    });

    // ── Online Status ──────────────────────────────────────────────────────────
    function setupOnlineStatus() {
      const statusRef = db.ref(`users/${currentUserUid}/public/online`);
      db.ref(".info/connected").on("value", snap => {
        if (snap && snap.val()) {
          statusRef.set(true);
          statusRef.onDisconnect().set(false);
        }
      });
    }

    // ── Users List ─────────────────────────────────────────────────────────────
function initUsersListener() {
  // Only listen to public data of all users
  db.ref("users").on("value", snap => {
    cachedUsers = {};
    snap.forEach(child => {
      const pub = child.child("public").val();
      if (pub) {
        cachedUsers[child.key] = { public: pub };
      }
    });
    renderUserList(cachedUsers);
  });
}

    


    
    function renderUserList(users) {
      const friends = Object.keys(users)
        .filter(uid => uid !== currentUserUid)
        .map(uid => {
          const u = users[uid].public || {};
          return {
            uid,
            name:   u.name   || "Unknown",
            gender: u.gender || "N/A",
            online: !!u.online,
            time:   lastChatTimestamps[uid] || 0
          };
        });

      friends.sort((a, b) => {
        const unreadA = unreadCounters[a.uid] || 0;
        const unreadB = unreadCounters[b.uid] || 0;
        // 1. Unread chats on top
        if ((unreadB > 0) !== (unreadA > 0)) return unreadB > 0 ? 1 : -1;
        // 2. Users with messages above those without
        if ((b.time > 0) !== (a.time > 0)) return b.time > 0 ? 1 : -1;
        // 3. Newest message first
        if (b.time !== a.time) return b.time - a.time;
        // 4. Online above offline
        if (b.online !== a.online) return b.online - a.online;
        // 5. Alphabetical
        return a.name.localeCompare(b.name);
      });

      userList.innerHTML = "";
      friends.forEach(f => {
        const row = document.createElement("div");
        row.className = "user-row" + (f.uid === currentChatFriendUid ? " active" : "");
        row.id = `userrow-${f.uid}`;
        row.dataset.uid  = f.uid;
        row.dataset.name = f.name;
        row.innerHTML = `
          <div>
            <span class="status-dot ${f.online ? "online" : "offline"}"></span>
            ${escapeHtml(f.name)} (${escapeHtml(f.gender)})
          </div>`;
        row.onclick = () => openChat(f.uid, f.name);
        userList.appendChild(row);
      });

      updateFriendListBadges();
    }

    function listenLastMessagesForUserList() {
      db.ref("chats").on("child_added", chatSnap => {
        const members = chatSnap.child("members").val() || {};
        if (!members[currentUserUid]) return;
        chatSnap.ref.child("messages").orderByChild("timestamp").limitToLast(1).on("value", snap => {
          if (!snap.exists()) return;
          const msg = Object.values(snap.val())[0];
          const otherUid = msg.sender === currentUserUid ? msg.receiver : msg.sender;
          lastChatTimestamps[otherUid] = msg.timestamp;
          if (Object.keys(cachedUsers).length > 0) renderUserList(cachedUsers);
        });
      });
    }

    // ── Friends List ───────────────────────────────────────────────────────────
    function listenFriendsList() {
      db.ref(`friends/${currentUserUid}`).on("value", snapshot => {
        const list = document.getElementById("friendsList");
        list.innerHTML = "";

        if (!snapshot.exists()) {
          list.innerHTML = "<li>No friends yet</li>";
          return;
        }

        const uniqueFriends = [...new Set(Object.keys(snapshot.val()))];

        uniqueFriends.forEach(friendUid => {
          // FIX: cachedUsers may not be populated yet; use optional chaining safely
          const name = cachedUsers?.[friendUid]?.public?.name || "Unknown User";

          const li       = document.createElement("li");
          const nameSpan = document.createElement("span");
          nameSpan.textContent = name;
          nameSpan.style.cursor = "pointer";
          nameSpan.onclick = () => openChat(friendUid, name);

          const viewBtn       = document.createElement("button");
          viewBtn.textContent = "View";
          viewBtn.className   = "view";
          viewBtn.onclick = (e) => {
            e.stopPropagation();
            window.location.href = `profile.html?uid=${friendUid}`;
          };

          li.appendChild(nameSpan);
          li.appendChild(viewBtn);
          list.appendChild(li);
        });
      });
    }

    // ── Unread Badges ──────────────────────────────────────────────────────────
    function setupUnreadListener() {
      db.ref(`unread/${currentUserUid}`).on("value", snap => {
        unreadCounters = {};
        const data = snap.val() || {};
        Object.keys(data).forEach(uid => unreadCounters[uid] = Object.keys(data[uid] || {}).length);
        renderUserList(cachedUsers);
      });
    }

    function updateFriendListBadges() {
      document.querySelectorAll(".user-row").forEach(r => {
        const uid   = r.dataset.uid;
        let badge   = r.querySelector(".badge");
        const count = Number(unreadCounters[uid] || 0);
        if (count > 0) {
          if (!badge) { badge = document.createElement("span"); badge.className = "badge"; r.querySelector("div").appendChild(badge); }
          badge.textContent = count;
        } else if (badge) {
          badge.remove();
        }
      });
    }

    function flashUserRow(uid) {
      const row = document.querySelector(`.user-row[data-uid="${uid}"]`);
      if (row) { row.classList.add("flash"); setTimeout(() => row.classList.remove("flash"), 800); }
    }

    // ── Open Chat ──────────────────────────────────────────────────────────────
    function openChat(uid, name) {
      // FIX: Set currentChatFriendUid ONCE, at the top
      currentChatFriendUid = uid;
      checkFriendStatus(uid);

      document.querySelectorAll(".user-row").forEach(r => r.classList.remove("active"));
      const activeRow = document.querySelector(`.user-row[data-uid="${uid}"]`);
      if (activeRow) activeRow.classList.add("active");

      chatWith.textContent = name;
      localStorage.setItem("lastChatFriendUid", uid);
      localStorage.setItem("lastChatFriendName", name);

      chatModal.style.display = "flex";
      chatMessages.innerHTML  = "";
      typingIndicator.textContent = "";

      // Clear unread
      db.ref(`unread/${currentUserUid}/${uid}`).remove();
      delete unreadCounters[uid];
      updateFriendListBadges();

      const chatId = getChatId(currentUserUid, uid);

      // FIX: Remove ALL listeners cleanly before attaching new ones
      if (currentChatListener) {
        currentChatListener.off();
      }

      db.ref(`chats/${chatId}/members`).update({ [currentUserUid]: true, [uid]: true });

      const chatRef = db.ref(`chats/${chatId}/messages`).orderByChild("timestamp").limitToLast(20);
      currentChatListener = chatRef;

      // Load last 20 messages
      chatRef.once("value", snap => {
        const msgs = snap.val() || {};
        Object.entries(msgs)
          .sort((a, b) => a[1].timestamp - b[1].timestamp)
          .forEach(([key, msg]) => addOrUpdateMessageToChat({ ...msg, _key: key }));
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });

      // Realtime: new messages
      chatRef.on("child_added", snap => {
        const msg = { ...snap.val(), _key: snap.key };
        if (document.getElementById(`msg-${snap.key}`)) return; // skip already-loaded

        addOrUpdateMessageToChat(msg);

        const otherUid = msg.sender === currentUserUid ? msg.receiver : msg.sender;
        lastChatTimestamps[otherUid] = msg.timestamp;
        renderUserList(cachedUsers);
        flashUserRow(otherUid);

        if (msg.receiver === currentUserUid && msg.sender !== currentUserUid) {
          if (currentChatFriendUid !== msg.sender) {
            db.ref(`unread/${currentUserUid}/${msg.sender}/${msg._key}`).set(true);
            flashUserRow(msg.sender);
          } else {
            db.ref(`unread/${currentUserUid}/${msg.sender}`).remove();
            delete unreadCounters[msg.sender];
            updateFriendListBadges();
          }
        }
      });

      // Realtime: updated messages (e.g. image finish uploading)
      chatRef.on("child_changed", snap => {
        addOrUpdateMessageToChat({ ...snap.val(), _key: snap.key });
      });

      listenTyping(uid);
    }

    // ── Render Message ─────────────────────────────────────────────────────────
    function addOrUpdateMessageToChat(msg) {
      if (!msg || !msg._key) return;
      const id     = `msg-${msg._key}`;
      let el       = document.getElementById(id);
      const isSelf = msg.sender === currentUserUid;
      if (!el) {
        el = document.createElement("div");
        el.id = id;
        el.className = `message ${isSelf ? "self" : "friend"}`;
        chatMessages.appendChild(el);
      }

      const ts = `<span class="timestamp ${isSelf ? "" : "friend"}">${new Date(msg.timestamp).toLocaleString()}</span>`;

      if (msg.fileData) {
        const isImage = msg.fileType?.startsWith("image/") || /\.(jpg|jpeg|png|gif)$/i.test(msg.fileName || "");
        if (isImage) {
          // FIX: fileData is a data URL — safe to use directly; fileName escaped for display only
          el.innerHTML = `<img class="chat-image" src="${msg.fileData}" alt="${escapeHtml(msg.fileName || 'image')}">${ts}`;
        } else {
          // FIX: escapeHtml applied to fileName in download attribute
          el.innerHTML = `<a href="${msg.fileData}" download="${escapeHtml(msg.fileName || "file")}">⬇️ ${escapeHtml(msg.fileName || "file")}</a>${ts}`;
        }
      } else if (msg.uploading) {
        el.innerHTML = `<span class="uploading-badge">Sending ${escapeHtml(msg.fileName || "...")}</span>${ts}`;
      } else if (msg.text) {
        el.innerHTML = `${escapeHtml(msg.text)}<div class="timestamp ${isSelf ? "" : "friend"}">${new Date(msg.timestamp).toLocaleString()}</div>`;
      } else {
        el.innerHTML = `<div class="small-muted">Unknown message</div>`;
      }

      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // ── Typing ─────────────────────────────────────────────────────────────────
    chatInput.addEventListener("input", () => {
      if (!currentChatFriendUid) return;
      db.ref(`typing/${currentChatFriendUid}/${currentUserUid}`).set(true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => db.ref(`typing/${currentChatFriendUid}/${currentUserUid}`).remove(), 1000);
    });

    function listenTyping(uid) {
      db.ref(`typing/${currentUserUid}/${uid}`).on("value", snap => {
        typingIndicator.textContent = snap.exists() ? `${chatWith.textContent} is typing...` : "";
      });
    }

    // ── Send Message ───────────────────────────────────────────────────────────
    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || !currentChatFriendUid) return;
      const chatId = getChatId(currentUserUid, currentChatFriendUid);
      const msg = { sender: currentUserUid, receiver: currentChatFriendUid, text, timestamp: Date.now() };
      chatInput.value = "";
      const msgRef = db.ref(`chats/${chatId}/messages`).push(msg);
      db.ref(`unread/${currentChatFriendUid}/${currentUserUid}/${msgRef.key}`).set(true);
    }

    sendBtn.onclick = sendMessage;
    chatInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
    fileBtn.onclick = () => chatFileInput.click();

    // ── Close Chat ─────────────────────────────────────────────────────────────
    function closeChat() {
      chatModal.style.display = "none";
      currentChatFriendUid = "";
      if (currentChatListener) {
        currentChatListener.off();
        currentChatListener = null;
      }
    }

    // ── Friend Status & Requests ───────────────────────────────────────────────
    async function checkFriendStatus(friendUid) {
      const snap = await db.ref(`friends/${currentUserUid}/${friendUid}`).once("value");
      const btn  = document.getElementById("addFriendBtn");
      btn.style.display = snap.exists() ? "none" : "inline-block";
    }

    // FIX: Exposed as window.sendFriendRequest so inline onclick can reach it
    window.sendFriendRequest = async function () {
      if (!currentChatFriendUid) { alert("No user selected"); return; }
      try {
        await db.ref(`friendRequests/${currentChatFriendUid}/${currentUserUid}`).set(true);
        alert("Friend request sent!");
        document.getElementById("addFriendBtn").style.display = "none";
      } catch (err) {
        console.error("Friend request error:", err);
        alert("Error sending request. Check console.");
      }
    };

    async function acceptRequest(senderUid) {
      try {
        await db.ref().update({
          [`friends/${currentUserUid}/${senderUid}`]: true,
          [`friends/${senderUid}/${currentUserUid}`]: true,
          [`friendRequests/${currentUserUid}/${senderUid}`]: null
        });
        alert("Friend request accepted!");
      } catch (err) {
        console.error(err);
      }
    }

    async function rejectRequest(senderUid) {
      await db.ref(`friendRequests/${currentUserUid}/${senderUid}`).remove();
    }

    // ── Notification Count ─────────────────────────────────────────────────────
    function listenNotificationCount() {
      // FIX: notifBadge is injected by auth listener; this is called after nav is built — safe
      db.ref(`friendRequests/${currentUserUid}`).on("value", snap => {
        const badge = document.getElementById("notifBadge");
        if (!badge) return;
        const count = snap.exists() ? Object.keys(snap.val()).length : 0;
        badge.style.display = count > 0 ? "inline-block" : "none";
        badge.textContent   = count > 0 ? count : "";
      });
    }

    // ── Resizable Chat Modal ───────────────────────────────────────────────────
    let isResizing = false, lastX, lastY, lastWidth, lastHeight;

    chatModal.addEventListener("mousedown", e => {
      if (e.target !== chatInput && e.target.tagName !== "BUTTON") {
        isResizing = true;
        lastX = e.clientX; lastY = e.clientY;
        const rect = chatModal.getBoundingClientRect();
        lastWidth = rect.width; lastHeight = rect.height;
        document.body.style.userSelect = "none";
      }
    });

    document.addEventListener("mousemove", e => {
      if (!isResizing) return;
      const newWidth  = Math.min(Math.max(lastWidth  + (e.clientX - lastX), 300), window.innerWidth  - 40);
      const newHeight = Math.min(Math.max(lastHeight + (e.clientY - lastY), 200), window.innerHeight - 60);
      chatModal.style.width  = `${newWidth}px`;
      chatModal.style.height = `${newHeight}px`;
    });

    document.addEventListener("mouseup", () => {
      if (isResizing) { isResizing = false; document.body.style.userSelect = "auto"; }
    });
  </script>
